<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Player</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
        }
        #momo-img {
            display: none; width: 100vw; height: 100vh;
            object-fit: contain; background-color: black;
            position: fixed; top: 0; left: 0; z-index: 9999;
        }
        #hacker-ui {
            display: none; position: fixed; bottom: 5%; width: 100%;
            color: #ff0000; font-family: 'Courier New', monospace;
            text-align: center; z-index: 10000;
            text-shadow: 2px 2px 4px #000;
        }
        #timer { font-size: 3.5rem; font-weight: bold; margin-top: 10px; color: #ff0000; }
        .msg { font-size: 1.2rem; font-weight: bold; padding: 0 10px; }
        
        .play-btn {
            width: 100%; height: 100%; border: none; background: #000;
            color: #fff; font-size: 1.5rem; cursor: pointer;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .icon { font-size: 4rem; margin-bottom: 10px; color: red; }
    </style>
</head>
<body>

    <button class="play-btn" onclick="startPrank()">
        <div class="icon">▶️</div>
        <div style="font-family: sans-serif;">شاهد الفيديو المضحك الآن</div>
    </button>

    <img id="momo-img" src="https://upload.wikimedia.org/wikipedia/en/7/77/Momo_challenge_statue.jpg" alt="MOMO">
    
    <div id="hacker-ui">
        <div class="msg" id="status-msg">جاري الاتصال بقاعدة بيانات الهاتف...</div>
        <div id="timer">01:00</div>
        <div class="msg">سيتم حذف جميع ملفاتك نهائياً عند انتهاء الوقت!</div>
    </div>

    <audio id="scream" loop>
        <source src="https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptitle=Scary+Scream&filename=24/246415-3882f0c7-020a-47cc-994b-4899589a544c.mp3" type="audio/mpeg">
    </audio>

    <script>
        function startPrank() {
            // إخفاء زر التشغيل
            document.querySelector('.play-btn').style.display = 'none';
            
            let img = document.getElementById('momo-img');
            let ui = document.getElementById('hacker-ui');
            let audio = document.getElementById('scream');
            let timerDisplay = document.getElementById('timer');
            let statusMsg = document.getElementById('status-msg');

            // تفعيل وضع ملء الشاشة لزيادة الرعب
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            }

            // إظهار المحتوى المرعب وتشغيل الصوت
            img.style.display = 'block';
            ui.style.display = 'block';
            audio.play();

            // بدء العداد التنازلي لـ 60 ثانية
            let timeLeft = 60;
            let countdown = setInterval(function() {
                timeLeft--;
                
                let seconds = timeLeft < 10 ? "0" + timeLeft : timeLeft;
                timerDisplay.innerText = "00:" + seconds;

                // اهتزاز نبضي في الهواتف التي تدعم ذلك
                if (navigator.vibrate) {
                    navigator.vibrate(200);
                }

                // تغيير الرسائل البرمجية الوهمية لزيادة الضغط النفسي
                if (timeLeft == 50) statusMsg.innerText = "تم اختراق الكاميرا والمعرض...";
                if (timeLeft == 40) statusMsg.innerText = "جاري سحب كلمات المرور والرسائل...";
                if (timeLeft == 30) statusMsg.innerText = "تم الوصول إلى الحسابات البنكية...";
                if (timeLeft == 20) statusMsg.innerText = "بدء عملية مسح ذاكرة النظام (Internal Storage)...";
                if (timeLeft == 10) statusMsg.innerText = "تنبيه: لا تقم بإغلاق الصفحة وإلا سيتلف المعالج!";

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    timerDisplay.innerText = "DONE";
                    statusMsg.innerText = "تم تدمير بيانات الهاتف بنجاح. وداعاً!";
                    if (navigator.vibrate) {
                        navigator.vibrate([500, 100, 500, 100, 1000]);
                    }
                }
            }, 1000);

            // منع الخروج العادي باللمس الخلفي في بعض المتصفحات
            window.history.pushState(null, null, window.location.href);
            window.onpopstate = function() {
                window.history.go(1);
            };
        }
    </script>
</body>
</html>
