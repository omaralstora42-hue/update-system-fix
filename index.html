<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث نظام أندرويد 2026</title>
    <style>
        body { background-color: #000; color: white; text-align: center; font-family: sans-serif; margin: 0; overflow: hidden; }
        #start-btn { margin-top: 40vh; padding: 20px 40px; font-size: 24px; background: #25d366; border: none; color: white; border-radius: 10px; cursor: pointer; }
        #scary-content { display: none; width: 100vw; height: 100vh; background: black; }
        img { width: 100%; height: 100%; object-fit: contain; }
        #timer { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 50px; color: red; font-weight: bold; }
    </style>
</head>
<body>

    <button id="start-btn">اضغط لتحديث النظام (إلزامي)</button>

    <div id="scary-content">
        <div id="timer">60</div>
        <img src="https://i.ibb.co/X7888mP/momo.jpg" alt="MOMO">
        <audio id="scream" src="https://www.myinstants.com/media/sounds/scary-scream-meme.mp3" loop></audio>
    </div>

    <script>
        const btn = document.getElementById('start-btn');
        const content = document.getElementById('scary-content');
        const audio = document.getElementById('scream');
        const timerDisplay = document.getElementById('timer');
        let timeLeft = 60;

        btn.onclick = function() {
            // تفعيل ملء الشاشة
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
            
            // إخفاء الزر وإظهار الرعب
            btn.style.display = 'none';
            content.style.display = 'block';
            
            // تشغيل الصوت والاهتزاز
            audio.play();
            if (navigator.vibrate) { navigator.vibrate([500, 200, 500, 200, 500]); }

            // بدء العداد التنازلي
            const countdown = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    alert("تم اختراق بياناتك بالكامل! وداعاً.");
                }
            }, 1000);
        };
    </script>
</body>
</html>
